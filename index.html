<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Smart Ops</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: oklch(0.18 0.008 260);
    --bg-2: oklch(0.215 0.008 260);
    --bg-3: oklch(0.245 0.009 260);
    --bg-hover: oklch(0.26 0.009 260);
    --line: oklch(0.30 0.009 260);
    --line-2: oklch(0.36 0.010 260);
    --fg: oklch(0.97 0.005 260);
    --fg-2: oklch(0.78 0.008 260);
    --fg-3: oklch(0.60 0.010 260);
    --fg-4: oklch(0.48 0.010 260);

    --accent: oklch(0.80 0.12 200);
    --accent-2: oklch(0.70 0.14 200);
    --accent-ink: oklch(0.20 0.04 200);
    --accent-glow: oklch(0.80 0.12 200 / 0.18);

    /* severity hues @ matched chroma & lightness */
    --sev-crit: oklch(0.72 0.17 25);
    --sev-high: oklch(0.76 0.15 45);
    --sev-med:  oklch(0.82 0.14 85);
    --sev-low:  oklch(0.78 0.11 210);
    --sev-info: oklch(0.75 0.08 250);
    --sev-ok:   oklch(0.78 0.12 155);

    --radius: 10px;
    --radius-sm: 7px;
    --radius-xs: 5px;

    --label-bg: oklch(0.32 0.06 330);
    --label-fg: oklch(0.85 0.10 330);
    --label-bd: oklch(0.45 0.09 330);
  }
  [data-theme="light"] {
    --bg: oklch(0.985 0.003 260);
    --bg-2: oklch(1 0 0);
    --bg-3: oklch(0.965 0.004 260);
    --bg-hover: oklch(0.955 0.005 260);
    --line: oklch(0.90 0.006 260);
    --line-2: oklch(0.82 0.008 260);
    --fg: oklch(0.22 0.01 260);
    --fg-2: oklch(0.38 0.012 260);
    --fg-3: oklch(0.55 0.012 260);
    --fg-4: oklch(0.68 0.012 260);

    --accent: oklch(0.45 0.16 240);
    --accent-2: oklch(0.40 0.18 240);
    --accent-glow: oklch(0.75 0.12 240 / 0.16);

    --sev-crit: oklch(0.58 0.17 25);
    --sev-high: oklch(0.62 0.15 45);
    --sev-med:  oklch(0.62 0.14 85);
    --sev-low:  oklch(0.60 0.11 210);
    --sev-info: oklch(0.55 0.08 250);
    --sev-ok:   oklch(0.58 0.12 155);

    --label-bg: oklch(0.96 0.03 330);
    --label-fg: oklch(0.48 0.18 330);
    --label-bd: oklch(0.88 0.06 330);
  }
  html, body { margin:0; padding:0; background: var(--bg); color: var(--fg); font-family: 'Geist', system-ui, sans-serif; font-size: 13px; line-height: 1.45; -webkit-font-smoothing: antialiased; }
  * { box-sizing: border-box; }
  button { font-family: inherit; color: inherit; background: none; border: 0; cursor: pointer; font-size: inherit; }
  button:disabled { cursor: not-allowed; }
  button:not(:disabled) { cursor: pointer !important; }
  input, textarea { font-family: inherit; color: inherit; }
  .mono { font-family: 'Geist Mono', ui-monospace, monospace; }
  #root { min-height: 100vh; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/icons.jsx"></script>
<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/chrome.jsx"></script>
<script type="text/babel" src="src/login.jsx"></script>
<script type="text/babel" src="src/events.jsx"></script>
<script type="text/babel" src="src/investigation.jsx"></script>
<script type="text/babel" src="src/event_detail.jsx"></script>
<script type="text/babel" src="src/users.jsx"></script>
<script type="text/babel" src="src/administration.jsx"></script>
<script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
